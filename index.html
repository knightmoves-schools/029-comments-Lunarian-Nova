<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Comments</title>
</head>
<body>
    <div>
        <div id="result">Replace Me</div>
    </div>
    <script>
        // start with a base value
        var total = 50;

        // decrement the value in a series of steps
        // each line subtracts a different amount from total
        total = total - 1; // subtract one
        total = total - 2; // subtract two
        total = total - 3; // subtract three
        total = total - 4; // subtract four
        total = total - 5; // subtract five
        total = total - 6; // subtract six
        total = total - 7; // subtract seven

        // display the final result inside the #result div
        document.getElementById('result').innerHTML = total;
    </script>
</body>
</html>
